schema_version: "1.0"

extension:
  id: "aioa-enforcement"
  name: "AIOA Compliance Enforcement"
  version: "1.0.0"
  description: "Mandatory pre-implementation AIOA compliance validation hook that enforces all 9 review gates before any code is written"
  author: "undef16"
  repository: "https://github.com/undef16/spec-kit-aioa"
  license: "MIT"

requires:
  speckit_version: ">=0.8.0"

provides:
  commands:
    - name: "speckit.aioa-enforcement.validate"
      file: "commands/speckit.aioa-enforcement.validate.md"
      description: "Validate AIOA compliance before implementation (mandatory hook)"
      aliases: ["speckit.aioa-enforcement.check"]
    - name: "speckit.aioa-enforcement.review"
      file: "commands/speckit.aioa-enforcement.review.md"
      description: "Run AIOA code review — checks all 9 gates (G1-G9) and TIP compliance on implemented code"

hooks:
  before_implement:
    command: "speckit.aioa-enforcement.validate"
    optional: false
    prompt: "Running mandatory AIOA compliance validation before implementation..."
