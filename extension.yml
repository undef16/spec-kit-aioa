schema_version: "1.0"

extension:
  id: "aioa-enforcement"
  name: "AIOA Compliance Enforcement"
  version: "1.0.0"
  description: "AIOA enforcement extension with mandatory hooks for constitution, specify, and implement phases — enforces AIOA TIP compliance across all phases"
  author: "undef16"
  repository: "https://github.com/undef16/spec-kit-aioa"
  license: "MIT"

requires:
  speckit_version: ">=0.8.0"

provides:
  commands:
    - name: "speckit.aioa-enforcement.validate"
      file: "commands/speckit.aioa-enforcement.validate.md"
      description: "Validate AIOA compliance before implementation (mandatory hook)"
      aliases: ["speckit.aioa-enforcement.check"]

hooks:
  after_constitution:
    command: "speckit.aioa-enforcement.validate"
    optional: false
    prompt: "Validating constitution against AIOA principles..."
    args:
      scope: "constitution"
  after_specify:
    command: "speckit.aioa-enforcement.validate"
    optional: false
    prompt: "Running AIOA principle validation before specification..."
    args:
      scope: "specify"
  after_plan:
    command: "speckit.aioa-enforcement.validate"
    optional: false
    prompt: "Running AIOA principle validation after plan..."
    args:
      scope: "plan"
  after_tasks:
    command: "speckit.aioa-enforcement.validate"
    optional: false
    prompt: "Running AIOA principle validation after tasks..."
    args:
      scope: "tasks"
  before_implement:
    command: "speckit.aioa-enforcement.validate"
    optional: false
    prompt: "Running mandatory AIOA compliance validation before implementation..."

  after_implement:
    command: "speckit.aioa-enforcement.validate"
    optional: false
    prompt: "Running AIOA principle validation after implement..."
    args:
      scope: "implement"

  after_implement_code_review:
    command: "speckit.code-review"
    optional: false
    prompt: "Running AIOA code review on generated source files..."
