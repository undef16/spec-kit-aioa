schema_version: "1.0"

preset:
  id: "aioa"
  version: "1.0.0"
  name: "AI-Oriented Architecture"
  description: "Makes AIOA principles executable by AI agents - minimizes Crystallization Radius, preserves Semantic Integrity, enforces Architectural Independence"
  author: "undef16"
  repository: "https://github.com/undef16/spec-kit-aioa"
  license: "MIT"
  tags: ["ai-architecture", "crystallization-radius", "semantic-integrity", "aioa"]

requires:
  speckit_version: ">=0.8.0"

provides:
  templates:
    - type: "template"
      name: "spec-template"
      file: "templates/spec-template-aioa.md"
      description: "AIOA additions for spec template"
      strategy: "wrap"
    - type: "template"
      name: "plan-template"
      file: "templates/plan-template-aioa.md"
      description: "AIOA additions for plan template"
      strategy: "wrap"
    - type: "template"
      name: "tasks-template"
      file: "templates/tasks-template-aioa.md"
      description: "AIOA additions for tasks template"
      strategy: "wrap"
    - type: "template"
      name: "constitution-template"
      file: "templates/constitution-template-aioa.md"
      description: "AIOA additions for constitution template"
      strategy: "wrap"
    - type: "command"
      name: "speckit.specify"
      file: "commands/speckit.specify.md"
      description: "Specify a task with AIOA constraints"
      strategy: "append"
    - type: "command"
      name: "speckit.plan"
      file: "commands/speckit.plan.md"
      description: "Generate a plan with AIOA principles"
      strategy: "append"
    - type: "command"
      name: "speckit.tasks"
      file: "commands/speckit.tasks.md"
      description: "Break down into tasks with AIOA rules"
      strategy: "append"

